<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideForge</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Geist+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:text!important;user-select:text!important}
:root{
  --bg:#0a0a0c;--s1:#111114;--s2:#18181c;--s3:#222228;
  --b1:#2c2c34;--b2:#3a3a44;
  --t1:#f2f2f0;--t2:#9090a0;--t3:#555560;
  --acc:#ffdd57;--acc2:#57c8ff;--acc3:#ff6b6b;--green:#57ffb8;
}
html,body{height:100%;overflow:hidden;font-family:'Lato',sans-serif;background:var(--bg);color:var(--t1)}

/* ── VIEWS ── */
#view-home,#view-editor{position:fixed;inset:0;display:flex;flex-direction:column}
#view-home{z-index:10;background:var(--bg);transition:opacity .25s,transform .25s}
#view-home.hidden{opacity:0;pointer-events:none;transform:translateY(-12px)}
#view-editor{z-index:5}

/* ── HOME ── */
#home-nav{height:56px;display:flex;align-items:center;padding:0 32px;border-bottom:1px solid var(--b1);gap:12px;flex-shrink:0}
#home-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:var(--acc);letter-spacing:-1px}
.hn-s{flex:1}
.hn-btn{background:none;border:1px solid var(--b1);color:var(--t1);font-family:'Lato',sans-serif;font-size:13px;padding:7px 16px;border-radius:7px;cursor:pointer;transition:.15s}
.hn-btn:hover{background:var(--s2)}
.hn-btn.cta{background:var(--acc);color:#111;font-weight:700;border-color:var(--acc)}.hn-btn.cta:hover{background:#ffe033}
#home-body{flex:1;overflow-y:auto;padding:40px 32px}
#home-hero{text-align:center;padding:50px 0 40px}
#home-hero h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(32px,5vw,60px);font-weight:800;letter-spacing:-2px;line-height:1.05;margin-bottom:14px}
#home-hero h1 span{color:var(--acc)}
#home-hero p{font-size:16px;color:var(--t2);max-width:440px;margin:0 auto 28px;line-height:1.6}
.hbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.hbtn{padding:11px 26px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;border:none;font-family:'Lato',sans-serif}
.hbtn.p{background:var(--acc);color:#111}.hbtn.p:hover{background:#ffe033;transform:translateY(-1px)}
.hbtn.s{background:var(--s2);color:var(--t1);border:1px solid var(--b1)}.hbtn.s:hover{background:var(--s3)}
#proj-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.pc{background:var(--s1);border:1px solid var(--b1);border-radius:11px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.pc:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.pc-th{aspect-ratio:16/9;background:var(--s2);position:relative;overflow:hidden}
.pc-thi{width:960px;height:540px;transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none}
.pc-inf{padding:11px 13px}
.pc-tit{font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.pc-meta{font-size:10px;color:var(--t3);font-family:'Geist Mono',monospace}
.pc-del{position:absolute;top:5px;right:5px;background:rgba(255,107,107,.9);border:none;color:#fff;width:20px;height:20px;border-radius:4px;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center}
.pc:hover .pc-del{display:flex}
.pc-new{border-style:dashed;background:transparent;flex-direction:column;display:flex;align-items:center;justify-content:center;gap:8px;min-height:150px;color:var(--t3)}
.pc-new:hover{color:var(--acc);border-color:var(--acc);background:rgba(255,221,87,.03)}
.pc-new span:first-child{font-size:26px}.pc-new span:last-child{font-size:12px;font-family:'Geist Mono',monospace}
.sec-h{max-width:1100px;margin:0 auto 16px;display:flex;align-items:center}
.sec-h h2{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700}

/* ── EDITOR TOP ── */
#ed-top{height:48px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;z-index:20}
#ed-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:800;color:var(--acc);cursor:pointer;letter-spacing:-0.5px;white-space:nowrap;padding:4px 6px;border-radius:5px;border:1px solid transparent;transition:.15s}
#ed-logo:hover{border-color:var(--b1);background:var(--s2)}
#ed-title{font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:600;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--t1);outline:none;padding:2px 6px;min-width:130px;transition:border-color .2s}
#ed-title:focus{border-color:var(--acc)}
.es{flex:1}
.etb{background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-size:12px;padding:4px 10px;border-radius:5px;cursor:pointer;transition:.15s;white-space:nowrap;font-family:'Lato',sans-serif}
.etb:hover{background:var(--b1)}
.etb.acc{background:var(--acc);color:#111;font-weight:700;border-color:var(--acc)}.etb.acc:hover{background:#ffe033}
.ed-sep{width:1px;height:18px;background:var(--b1);margin:0 2px;flex-shrink:0}

/* ── EDITOR BODY (resizable columns) ── */
#ed-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* Resizable divider */
.resize-divider{width:4px;background:var(--b1);cursor:col-resize;flex-shrink:0;transition:background .15s;z-index:10}
.resize-divider:hover,.resize-divider.dragging{background:var(--acc2)}
.resize-divider-h{height:4px;background:var(--b1);cursor:row-resize;flex-shrink:0;transition:background .15s;z-index:10}
.resize-divider-h:hover,.resize-divider-h.dragging{background:var(--acc2)}

/* ── SLIDE STRIP ── */
#strip{background:var(--s1);border-right:none;overflow-y:auto;display:flex;flex-direction:column;min-width:100px;max-width:400px}
#strip-head{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;font-family:'Geist Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--b1);flex-shrink:0}
#strip-add{background:none;border:1px solid var(--b1);color:var(--acc);cursor:pointer;width:20px;height:20px;border-radius:4px;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
#strip-add:hover{background:var(--s2)}
#strip-list{padding:7px;display:flex;flex-direction:column;gap:5px;flex:1}
.sth{border:2px solid var(--b1);border-radius:6px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:16/9;background:var(--s2);transition:border-color .15s;flex-shrink:0}
.sth:hover{border-color:var(--b2)}.sth.active{border-color:var(--acc)}
.sth-i{width:960px;height:540px;transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none}
.sth-n{position:absolute;bottom:2px;left:3px;font-family:'Geist Mono',monospace;font-size:8px;color:rgba(255,255,255,.4);background:rgba(0,0,0,.5);padding:1px 3px;border-radius:2px}
.sth-del{position:absolute;top:2px;right:2px;background:rgba(255,107,107,.9);border:none;color:#fff;width:14px;height:14px;border-radius:3px;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.sth:hover .sth-del{display:flex}

/* ── CANVAS ZONE ── */
#czone{flex:1;display:flex;flex-direction:column;background:#0d0d10;overflow:hidden;position:relative;min-width:200px}
#cwrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
#couter{position:relative;box-shadow:0 20px 80px rgba(0,0,0,.7);border-radius:2px}
#sc{width:960px;height:540px;position:relative;overflow:hidden;transform-origin:top left}

/* Zoom bar */
#zoom-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:4px 8px;display:flex;align-items:center;gap:5px;z-index:30;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.zb{background:none;border:none;color:var(--t2);font-size:15px;width:26px;height:26px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.zb:hover{background:var(--s2);color:var(--t1)}
#zoom-val{font-family:'Geist Mono',monospace;font-size:11px;color:var(--t2);min-width:38px;text-align:center;cursor:pointer}
#zoom-val:hover{color:var(--acc)}

/* ── ELEMENTS ── */
.el{position:absolute}
.el.mv{cursor:move}
.el.sel{outline:2px solid var(--acc2);outline-offset:1px}
.el-bar{position:absolute;top:-28px;left:0;background:var(--acc2);border-radius:5px;display:flex;gap:1px;padding:2px 3px;z-index:9999;opacity:0;pointer-events:none;white-space:nowrap}
.el.sel .el-bar{opacity:1;pointer-events:all}
.el-bar button{background:none;border:none;color:#000;font-size:9px;cursor:pointer;padding:1px 4px;border-radius:3px;font-family:'Geist Mono',monospace;font-weight:600}
.el-bar button:hover{background:rgba(0,0,0,.2)}
.el-rz{position:absolute;bottom:-5px;right:-5px;width:10px;height:10px;background:var(--acc2);border-radius:2px;cursor:se-resize;opacity:0}
.el.sel .el-rz{opacity:1}
.el-txt{width:100%;height:100%;word-break:break-word;outline:none;overflow:hidden}
.el-shp{width:100%;height:100%}

/* pos-kf marker on element */
.el.pos-kf-target{outline:2px dashed var(--acc)!important;outline-offset:2px}

/* ── ANIMATION PANEL ── */
#anim-panel{background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
#anim-panel.col{height:34px!important}
#anim-hd{height:34px;display:flex;align-items:center;padding:0 10px;gap:7px;border-bottom:1px solid var(--b1);flex-shrink:0;overflow:hidden}
#anim-title-lbl{font-family:'Geist Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.atb{background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-size:11px;padding:2px 7px;border-radius:4px;cursor:pointer;transition:.15s;font-family:'Geist Mono',monospace;white-space:nowrap}
.atb:hover{background:var(--b1);color:var(--t1)}
.atb.green{border-color:var(--green);color:var(--green)}.atb.green:hover{background:rgba(87,255,184,.08)}
.atb.yellow{border-color:var(--acc);color:var(--acc)}.atb.yellow:hover{background:rgba(255,221,87,.08)}
#anim-time-lbl{font-family:'Geist Mono',monospace;font-size:11px;color:var(--t2);white-space:nowrap}
#anim-toggle{margin-left:auto;background:none;border:1px solid var(--b1);color:var(--t3);font-size:10px;padding:1px 7px;border-radius:4px;cursor:pointer;white-space:nowrap}
#anim-toggle:hover{background:var(--s2)}
#anim-body{flex:1;display:flex;overflow:hidden;min-height:0}
#anim-labels{width:150px;flex-shrink:0;border-right:1px solid var(--b1);overflow-y:auto;overflow-x:hidden}
.al-row{height:32px;display:flex;align-items:center;padding:0 8px;font-size:11px;color:var(--t2);border-bottom:1px solid var(--b1);gap:5px;cursor:pointer;transition:.15s;overflow:hidden;white-space:nowrap}
.al-row:hover{background:var(--s2)}.al-row.sel{color:var(--acc2)}
.al-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#anim-tl{flex:1;position:relative;overflow:auto}
#anim-ruler{height:18px;background:var(--s2);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:5;min-width:100%}
.ruler-t{position:absolute;font-family:'Geist Mono',monospace;font-size:8px;color:var(--t3);top:3px;pointer-events:none}
#anim-rows{position:relative}
.at-row{height:32px;border-bottom:1px solid var(--b1);position:relative;min-width:100%}
.akf{position:absolute;height:20px;top:6px;border-radius:4px;cursor:pointer;display:flex;align-items:center;padding:0 5px;font-family:'Geist Mono',monospace;font-size:8px;color:#000;font-weight:700;white-space:nowrap;overflow:hidden;min-width:24px;z-index:2}
.akf:hover{filter:brightness(1.1)}
.akf.sel-kf{outline:2px solid #fff;outline-offset:1px}
.akf-rz{position:absolute;right:0;top:0;bottom:0;width:7px;cursor:ew-resize;background:rgba(0,0,0,.3);border-radius:0 4px 4px 0;flex-shrink:0}
#playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--acc3);pointer-events:none;z-index:10}
#playhead::before{content:'▼';position:absolute;top:-1px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--acc3)}

/* ── KF INSPECTOR ── */
#kf-ins{position:absolute;background:var(--s1);border:1px solid var(--b2);border-radius:10px;padding:14px;width:230px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none}
#kf-ins.open{display:block}
#kf-ins-hd{font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
#kf-ins-x{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;line-height:1}
.ki-row{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.ki-row label{font-size:10px;color:var(--t2);min-width:52px;font-family:'Geist Mono',monospace}
.ki-inp{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:'Geist Mono',monospace;font-size:11px;padding:4px 6px;border-radius:5px;outline:none}
.ki-inp:focus{border-color:var(--acc2)}
.ki-hint{font-size:9px;color:var(--green);background:rgba(87,255,184,.08);border:1px solid rgba(87,255,184,.2);border-radius:5px;padding:5px 7px;margin-bottom:6px;line-height:1.4}
.ki-del{width:100%;background:rgba(255,107,107,.1);border:1px solid var(--acc3);color:var(--acc3);font-size:11px;padding:5px;border-radius:5px;cursor:pointer;margin-top:6px;font-family:'Lato',sans-serif;transition:.15s}
.ki-del:hover{background:rgba(255,107,107,.2)}

/* ── RIGHT PANEL ── */
#rp{background:var(--s1);border-left:none;overflow-y:auto;display:flex;flex-direction:column;min-width:140px;max-width:500px}
.rp-s{border-bottom:1px solid var(--b1);padding:11px}
.rp-lbl{font-family:'Geist Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px}
.rp-row{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.rp-row label{font-size:11px;color:var(--t2);min-width:46px;flex-shrink:0}
.ri{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:'Geist Mono',monospace;font-size:11px;padding:4px 6px;border-radius:5px;outline:none;min-width:0}
.ri:focus{border-color:var(--acc2)}
.ri-ta{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:'Lato',sans-serif;font-size:12px;padding:6px 7px;border-radius:5px;outline:none;resize:vertical;min-height:60px;line-height:1.4;min-width:0}
.ri-ta:focus{border-color:var(--acc2)}
.ri-c{width:30px;height:24px;border-radius:5px;border:1px solid var(--b1);padding:0;overflow:hidden;cursor:pointer;background:none;flex-shrink:0}
.ri-c input{width:100%;height:100%;border:none;padding:0;cursor:pointer;margin:-2px}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:10px}
.aeb{background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-size:11px;padding:7px 3px;border-radius:5px;cursor:pointer;transition:.15s;text-align:center;font-family:'Lato',sans-serif}
.aeb:hover{border-color:var(--acc);color:var(--acc);background:rgba(255,221,87,.04)}
.bg-sw-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.bg-sw{height:24px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:.15s}
.bg-sw.active{border-color:var(--acc2)}
.hint{font-size:10px;color:var(--t3);background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:7px 9px;line-height:1.5;margin:9px}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:26px;width:440px;max-width:90vw;position:relative;transform:translateY(10px);transition:transform .2s}
.ov.open .modal{transform:translateY(0)}
.modal h2{font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:700;margin-bottom:4px}
.modal p{font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.5}
.modal-x{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--t2);font-size:17px;cursor:pointer}
.sh-row{display:flex;gap:6px;margin-bottom:16px}
.sh-inp{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:'Geist Mono',monospace;font-size:11px;padding:8px 10px;border-radius:6px;outline:none}
.ma{display:flex;gap:6px;flex-wrap:wrap}
.ma-btn{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-size:12px;padding:8px;border-radius:7px;cursor:pointer;transition:.15s;font-family:'Lato',sans-serif}
.ma-btn:hover{background:var(--s3)}

/* ── PRESENT ── */
#pv{position:fixed;inset:0;background:#000;z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center}
#pv.open{display:flex}
#pv-slide{position:relative}
#pv-ctrl{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:6px 16px;display:flex;align-items:center;gap:10px;z-index:2001}
#pv-ctrl button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.6;transition:.15s;line-height:1}
#pv-ctrl button:hover{opacity:1}
#pv-n{font-family:'Geist Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);min-width:46px;text-align:center}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
select.ri option,select.ki-inp option{background:var(--s2)}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="view-home">
  <nav id="home-nav">
    <span id="home-logo">SlideForge</span><span class="hn-s"></span>
    <button class="hn-btn" onclick="triggerImport()">Import .JSON</button>
    <button class="hn-btn cta" onclick="newProject()">+ New Presentation</button>
  </nav>
  <div id="home-body">
    <div id="home-hero">
      <h1>Build <span>beautiful</span><br>presentations</h1>
      <p>Drag & drop · Animation timeline · One-click sharing</p>
      <div class="hbtns">
        <button class="hbtn p" onclick="newProject()">Create Presentation</button>
        <button class="hbtn s" onclick="triggerImport()">Open from file</button>
      </div>
    </div>
    <div class="sec-h"><h2>Your Presentations</h2></div>
    <div id="proj-grid"></div>
  </div>
</div>

<!-- ══ EDITOR ══ -->
<div id="view-editor">
  <div id="ed-top">
    <span id="ed-logo" onclick="goHome()">← SlideForge</span>
    <div class="ed-sep"></div>
    <input id="ed-title" value="Untitled Presentation"/>
    <span class="es"></span>
    <button class="etb" onclick="undoA()">↩ Undo</button>
    <button class="etb" onclick="redoA()">↪ Redo</button>
    <div class="ed-sep"></div>
    <button class="etb" onclick="openPresent()">▶ Present</button>
    <button class="etb" onclick="exportJSON()">↓ Save</button>
    <button class="etb acc" onclick="openShare()">⬆ Share</button>
  </div>
  <div id="ed-body">
    <!-- SLIDE STRIP -->
    <div id="strip" style="width:168px">
      <div id="strip-head"><span>Slides</span><button id="strip-add" onclick="addSlide()">+</button></div>
      <div id="strip-list"></div>
    </div>
    <div class="resize-divider" id="div-left"></div>

    <!-- CANVAS ZONE -->
    <div id="czone">
      <div id="cwrap">
        <div id="couter"><div id="sc" onmousedown="cvBgDown(event)"></div></div>
        <div id="zoom-bar">
